# Pre-commit hooks. Run with `prek` (Rust drop-in replacement for pre-commit).
#
# One-time setup:
#   brew install prek
#   prek install
#
# Manual run across the whole repo:
#   prek run --all-files

repos:
  # Standard hygiene hooks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Swift formatting via the toolchain-bundled swift-format.
  # Runs in-place so the commit picks up the formatted version.
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        entry: swift format --in-place
        language: system
        files: \.swift$
        # Exclude generated files and Xcode project descriptors.
        exclude: ^(Packages/.*/\.build/|.*\.xcodeproj/)
