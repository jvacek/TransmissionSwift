name: Pre-release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-prerelease:
    name: Build macOS app pre-release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify default branch
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Pre-releases are only published from main."
            exit 1
          fi

      - name: Resolve release commit
        run: |
          set -euo pipefail

          release_year="$(date -u +%Y)"
          release_month="$(date -u +%m)"
          release_day="$(date -u +%d)"
          release_month="${release_month#0}"
          release_day="${release_day#0}"

          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"
          echo "RELEASE_DATE=${release_year}-$(date -u +%m)-$(date -u +%d)" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD_VERSION=${release_year}.${release_month}.${release_day}" >> "$GITHUB_ENV"

      - name: Verify CI succeeded for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ci.yml
        run: |
          set -euo pipefail

          conclusion="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW}/runs?head_sha=${RELEASE_SHA}&event=push&status=success&per_page=1" \
            --jq '.workflow_runs[0].conclusion // ""')"

          if [ "$conclusion" != "success" ]; then
            echo "CI has not succeeded for ${RELEASE_SHA}."
            echo "Wait for the push CI run to pass, then manually start this workflow again."
            exit 1
          fi

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build Release app
        run: |
          set -euo pipefail
          set -o pipefail

          xcodebuild \
            -project TransmissionSwift.xcodeproj \
            -scheme TransmissionSwift \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            CURRENT_PROJECT_VERSION="$RELEASE_BUILD_VERSION" \
            build | xcbeautify --renderer github-actions

      - name: Zip app bundle
        run: |
          set -euo pipefail

          app_path="build/DerivedData/Build/Products/Release/TransmissionSwift.app"
          zip_path="build/TransmissionSwift-${RELEASE_DATE}-${SHORT_SHA}.zip"

          if [ ! -d "$app_path" ]; then
            echo "Expected app bundle not found at ${app_path}."
            exit 1
          fi

          ditto -c -k --keepParent "$app_path" "$zip_path"
          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: Install Sparkle tools
        run: |
          set -euo pipefail

          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz" \
            -o /tmp/sparkle.tar.xz
          tar xf /tmp/sparkle.tar.xz -C /tmp/
          echo "/tmp/sparkle/bin" >> "$GITHUB_PATH"

      - name: Sign zip and generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          tag="prerelease-${RELEASE_DATE}-${SHORT_SHA}"
          zip_filename="TransmissionSwift-${RELEASE_DATE}-${SHORT_SHA}.zip"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${zip_filename}"
          release_notes_url="https://jvacek.github.io/TransmissionSwift/release-notes-${tag}.md"

          mkdir -p build/appcast

          # Sign the zip and capture signature + length
          sign_output=$(echo "$SPARKLE_PRIVATE_KEY" | sign_update \
            --ed-key-file - "$ZIP_PATH")
          signature=$(echo "$sign_output" | sed -n \
            's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          length=$(echo "$sign_output" | sed -n \
            's/.*length="\([^"]*\)".*/\1/p')

          echo "SIGNATURE=$signature" >> "$GITHUB_ENV"
          echo "ED_LENGTH=$length" >> "$GITHUB_ENV"
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "ZIP_FILENAME=$zip_filename" >> "$GITHUB_ENV"
          echo "DOWNLOAD_URL=$download_url" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_URL=$release_notes_url" >> "$GITHUB_ENV"

          # Generate changelog from git log
          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          changelog_file="build/changelog.md"
          if [ -n "$last_tag" ]; then
            echo "# Changes since ${last_tag}" > "$changelog_file"
            echo "" >> "$changelog_file"
            git log "$last_tag..HEAD" --oneline --no-decorate >> "$changelog_file"
          else
            echo "# Initial pre-release" > "$changelog_file"
          fi

          # Copy as release-notes-<tag>.md for gh-pages
          cp "$changelog_file" "build/appcast/release-notes-${tag}.md"

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          changelog_file="build/changelog.md"
          title="Pre-release ${RELEASE_DATE} ${SHORT_SHA}"

          gh release create "$TAG" \
            "$ZIP_PATH#$ZIP_FILENAME" \
            --target "$RELEASE_SHA" \
            --prerelease \
            --title "$title" \
            --notes-file "$changelog_file"

      - name: Fetch existing appcast
        run: |
          set -euo pipefail

          curl -sL \
            "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/appcast.xml" \
            -o build/appcast/appcast.xml || true

      - name: Update appcast
        run: |
          set -euo pipefail

          python3 scripts/update_appcast.py \
            --appcast-path build/appcast/appcast.xml \
            --download-url "$DOWNLOAD_URL" \
            --title "Pre-release ${RELEASE_DATE}" \
            --short-version "0.1" \
            --build-version "$RELEASE_BUILD_VERSION" \
            --signature "$SIGNATURE" \
            --length "$ED_LENGTH" \
            --release-notes-url "$RELEASE_NOTES_URL" \
            --channel "beta"

      - name: Deploy appcast to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/appcast
          keep_files: true
