name: Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build stable release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Verify default branch
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Releases are only published from main."
            exit 1
          fi

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be in semver format (e.g. 1.0.0)"
            exit 1
          fi

      - name: Verify changelog
        run: |
          set -euo pipefail

          changelog_path="changelog/${{ inputs.version }}.md"
          if [ ! -f "$changelog_path" ]; then
            echo "Changelog not found at ${changelog_path}."
            echo "Create a file at changelog/${{ inputs.version }}.md with your release notes."
            exit 1
          fi
          echo "CHANGELOG_PATH=$changelog_path" >> "$GITHUB_ENV"

      - name: Resolve release metadata
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          release_year="$(date -u +%Y)"
          release_month="$(date -u +%m)"
          release_day="$(date -u +%d)"
          release_month="${release_month#0}"
          release_day="${release_day#0}"

          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "RELEASE_DATE=${release_year}-$(date -u +%m)-$(date -u +%d)" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD_VERSION=${release_year}.${release_month}.${release_day}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build arm64-only app
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          set -o pipefail

          xcodebuild \
            -project TransmissionSwift.xcodeproj \
            -scheme TransmissionSwift \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CURRENT_PROJECT_VERSION="$RELEASE_BUILD_VERSION" \
            MARKETING_VERSION="$VERSION" \
            build | xcbeautify --renderer github-actions

      - name: Zip arm64 bundle
        run: |
          set -euo pipefail

          app_path="build/DerivedData/Build/Products/Release/TransmissionSwift.app"
          zip_path="build/TransmissionSwift-$TAG-arm64.zip"

          if [ ! -d "$app_path" ]; then
            echo "Expected arm64 app bundle not found at ${app_path}."
            exit 1
          fi

          ditto -c -k --keepParent "$app_path" "$zip_path"
          echo "ZIP_PATH_ARM64=$zip_path" >> "$GITHUB_ENV"

      - name: Build universal app (reuses arm64 cache)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          set -o pipefail

          xcodebuild \
            -project TransmissionSwift.xcodeproj \
            -scheme TransmissionSwift \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            CURRENT_PROJECT_VERSION="$RELEASE_BUILD_VERSION" \
            MARKETING_VERSION="$VERSION" \
            build | xcbeautify --renderer github-actions

      - name: Zip universal bundle
        run: |
          set -euo pipefail

          app_path="build/DerivedData/Build/Products/Release/TransmissionSwift.app"
          zip_path="build/TransmissionSwift-$TAG.zip"

          if [ ! -d "$app_path" ]; then
            echo "Expected app bundle not found at ${app_path}."
            exit 1
          fi

          ditto -c -k --keepParent "$app_path" "$zip_path"
          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: Install Sparkle tools
        run: |
          set -euo pipefail

          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar xf /tmp/sparkle.tar.xz --strip-components=1 -C /tmp/sparkle
          echo "/tmp/sparkle/bin" >> "$GITHUB_PATH"

      - name: Sign zips and generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          mkdir -p build/appcast

          # --- Universal zip ---
          zip_filename="TransmissionSwift-$TAG.zip"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${zip_filename}"

          sign_output=$(echo "$SPARKLE_PRIVATE_KEY" | sign_update \
            --ed-key-file - "$ZIP_PATH")
          signature=$(echo "$sign_output" | sed -n \
            's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          length=$(echo "$sign_output" | sed -n \
            's/.*length="\([^"]*\)".*/\1/p')

          echo "SIGNATURE=$signature" >> "$GITHUB_ENV"
          echo "ED_LENGTH=$length" >> "$GITHUB_ENV"
          echo "ZIP_FILENAME=$zip_filename" >> "$GITHUB_ENV"
          echo "DOWNLOAD_URL=$download_url" >> "$GITHUB_ENV"

          # --- Arm64-only zip ---
          zip_filename_arm64="TransmissionSwift-$TAG-arm64.zip"
          download_url_arm64="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${zip_filename_arm64}"

          sign_output_arm64=$(echo "$SPARKLE_PRIVATE_KEY" | sign_update \
            --ed-key-file - "$ZIP_PATH_ARM64")
          signature_arm64=$(echo "$sign_output_arm64" | sed -n \
            's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          length_arm64=$(echo "$sign_output_arm64" | sed -n \
            's/.*length="\([^"]*\)".*/\1/p')

          echo "SIGNATURE_ARM64=$signature_arm64" >> "$GITHUB_ENV"
          echo "ED_LENGTH_ARM64=$length_arm64" >> "$GITHUB_ENV"
          echo "ZIP_FILENAME_ARM64=$zip_filename_arm64" >> "$GITHUB_ENV"
          echo "DOWNLOAD_URL_ARM64=$download_url_arm64" >> "$GITHUB_ENV"

          # --- Release notes ---
          release_notes_url="https://jvacek.github.io/TransmissionSwift/release-notes-${TAG}.md"
          echo "RELEASE_NOTES_URL=$release_notes_url" >> "$GITHUB_ENV"

          cp "$CHANGELOG_PATH" "build/appcast/release-notes-${TAG}.md"
          cp "$CHANGELOG_PATH" "build/changelog.md"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          changelog_file="build/changelog.md"
          title="TransmissionSwift ${VERSION}"

          gh release create "$TAG" \
            "$ZIP_PATH#$ZIP_FILENAME" \
            "$ZIP_PATH_ARM64#$ZIP_FILENAME_ARM64" \
            --target "$RELEASE_SHA" \
            --title "$title" \
            --notes-file "$changelog_file"

      - name: Fetch existing appcast
        run: |
          set -euo pipefail

          curl -sL \
            "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/appcast.xml" \
            -o build/appcast/appcast.xml || true

      - name: Update appcast
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          python3 scripts/update_appcast.py \
            --appcast-path build/appcast/appcast.xml \
            --download-url "$DOWNLOAD_URL" \
            --title "Version ${VERSION}" \
            --short-version "$VERSION" \
            --build-version "$RELEASE_BUILD_VERSION" \
            --signature "$SIGNATURE" \
            --length "$ED_LENGTH" \
            --release-notes-url "$RELEASE_NOTES_URL" \
            --download-url-arm64 "$DOWNLOAD_URL_ARM64" \
            --signature-arm64 "$SIGNATURE_ARM64" \
            --length-arm64 "$ED_LENGTH_ARM64"

      - name: Deploy appcast to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/appcast
          keep_files: true
