name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on new pushes to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (swift-format + prek)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install prek
        run: brew install prek

      - name: Cache prek hook env
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: prek-${{ runner.os }}-

      - name: Run pre-commit hooks
        run: prek run --all-files --show-diff-on-failure

  test-packages:
    name: Test Swift packages
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package: [TransmissionRPC, TransmissionCore]
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            Packages/${{ matrix.package }}/.build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: spm-${{ runner.os }}-${{ matrix.package }}-

      - name: Test ${{ matrix.package }}
        working-directory: Packages/${{ matrix.package }}
        # The package directories don't exist until the first slice lands.
        # Skip gracefully so this workflow can be merged before the packages exist.
        run: |
          if [ ! -f Package.swift ]; then
            echo "Package not yet present — skipping."
            exit 0
          fi
          # -warnings-as-errors lives here, not in Package.swift: Xcode passes
          # -suppress-warnings to package dependencies, and the two flags conflict.
          swift test --enable-code-coverage -Xswiftc -warnings-as-errors

  build-app:
    name: Build & test macOS app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('TransmissionSwift.xcodeproj/project.pbxproj') }}
          restore-keys: deriveddata-${{ runner.os }}-

      - name: Show available simulators / SDKs
        run: xcodebuild -showsdks

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project TransmissionSwift.xcodeproj \
            -scheme TransmissionSwift \
            -configuration Debug \
            -destination 'platform=macOS' \
            build | xcbeautify --renderer github-actions

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project TransmissionSwift.xcodeproj \
            -scheme TransmissionSwift \
            -configuration Debug \
            -destination 'platform=macOS' \
            test | xcbeautify --renderer github-actions
